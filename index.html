<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЛидПоток: Китай</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #fff);
            --text: var(--tg-theme-text-color, #000);
            --hint: var(--tg-theme-hint-color, #999);
            --button: var(--tg-theme-button-color, #3390ec);
            --button-text: var(--tg-theme-button-text-color, #fff);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #f1f1f1);
            --success: #4cd964;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 16px; padding-bottom: 100px; line-height: 1.5; }
        .screen { display: none; animation: fadeIn 0.3s; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .header { text-align: center; padding: 15px 0 20px; margin-bottom: 10px; border-bottom: 1px solid var(--secondary-bg); }
        .logo { font-size: 22px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .subtitle { color: var(--hint); font-size: 13px; margin-top: 4px; }
        
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 1px solid var(--secondary-bg); border-radius: 10px; background: var(--secondary-bg); color: var(--text); font-size: 16px; outline: none; }
        input:focus, select:focus { border-color: var(--button); }
        
        .btn { width: 100%; padding: 14px; background: var(--button); color: var(--button-text); border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn:active { opacity: 0.9; }
        .btn-outline { background: transparent; border: 2px solid var(--button); color: var(--button); }
        .btn-success { background: var(--success); color: #fff; }
        .btn-reset { background: transparent; color: var(--hint); font-size: 14px; margin-top: 10px; }
        
        /* Плавающая кнопка админки */
        .fab-admin {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--button);
            color: var(--button-text);
            border: none;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(0,0,0,0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: transform 0.2s, background 0.2s;
        }
        .fab-admin:hover { transform: scale(1.05); }
        .fab-admin:active { transform: scale(0.95); background: #2675c9; }
        
        .lead-card { background: var(--secondary-bg); border-radius: 12px; padding: 14px; margin-bottom: 12px; border-left: 4px solid var(--success); }
        .lead-title { font-weight: 700; font-size: 16px; margin-bottom: 4px; }
        .lead-hot { display: inline-block; background: rgba(76, 217, 100, 0.15); color: var(--success); padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; margin-bottom: 8px; }
        .lead-info { font-size: 13px; color: var(--hint); margin: 4px 0; }
        .lead-phone { color: var(--button); font-weight: 600; text-decoration: none; display: block; margin: 8px 0; font-size: 15px; }
        .lead-reason { font-size: 13px; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--hint); background: rgba(51,144,236,0.08); padding: 8px 10px; border-radius: 6px; }
        
        .toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 1px solid var(--secondary-bg); padding: 10px 16px; display: flex; flex-direction: column; gap: 8px; z-index: 100; }
        .toolbar .btn { margin: 0; font-size: 14px; padding: 12px; }
        
        .empty-state { text-align: center; padding: 40px 20px; color: var(--hint); }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
        .filters-summary { background: var(--secondary-bg); padding: 10px 14px; border-radius: 10px; margin-bottom: 16px; font-size: 13px; }
        .counter { text-align: center; font-size: 24px; font-weight: 700; margin: 10px 0; color: var(--button); }
        
        .admin-header { background: #fff0f0; padding: 12px; border-radius: 10px; margin-bottom: 16px; border: 1px solid #ffcccc; }
        .back-link { color: var(--button); text-decoration: none; font-size: 14px; display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>

    <!-- 🟢 ПЛАВАЮЩАЯ КНОПКА АДМИНКИ -->
    <button id="fab-admin" class="fab-admin" title="Админка">⚙️</button>

    <!-- ЭКРАН 1: Форма поиска -->
    <div id="screen-search" class="screen active">
        <div class="header">
            <div class="logo">🇨→🇷🇺 ЛидПоток: Китай</div>
            <div class="subtitle">Находи импортёров, которым нужна доставка</div>
        </div>
        
        <div class="form-group">
            <label> Какие грузы ты возишь?</label>
            <select id="cargo_type">
                <option value="">Выберите...</option>
                <option value="одежда_текстиль">Одежда, текстиль, обувь</option>
                <option value="электроника">Электроника, гаджеты</option>
                <option value="оборудование">Станки, оборудование</option>
                <option value="товары_для_дома">Товары для дома, декор</option>
                <option value="автозапчасти">Автозапчасти</option>
                <option value="сырьё">Сырьё, материалы</option>
                <option value="любые">Любые грузы (универсал)</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>📍 В какие регионы РФ доставляешь?</label>
            <input type="text" id="regions" placeholder="Например: Москва, СПб, Краснодар...">
        </div>
        
        <div class="form-group">
            <label> Минимальный объём (тонн)</label>
            <select id="min_volume">
                <option value="0">Любой (от 1 кг)</option>
                <option value="1">От 1 тонны</option>
                <option value="5">От 5 тонн</option>
                <option value="20">От 20 тонн (контейнер)</option>
            </select>
        </div>
        
        <button class="btn" id="btn-find">🔍 Найти клиентов</button>
        <button class="btn btn-reset" id="btn-reset">🔄 Сбросить форму</button>
    </div>

    <!-- ЭКРАН 2: База лидов -->
    <div id="screen-leads" class="screen">
        <div class="header">
            <div class="logo">🔥 Горячие лиды</div>
            <div class="subtitle" id="leads-date">Сгенерировано: <span id="current-time"></span></div>
        </div>
        
        <div class="filters-summary" id="filters-summary"></div>
        <div class="counter">Найдено: <span id="leads-count">0</span> компаний</div>
        
        <div id="leads-list">
            <div class="empty-state">
                <div class="icon">🔍</div>
                <p>Заполните форму, чтобы найти импортёров из Китая</p>
            </div>
        </div>
    </div>

    <!-- ЭКРАН 3: АДМИНКА -->
    <div id="screen-admin" class="screen">
        <div class="header">
            <div class="logo">⚙️ Админ-панель</div>
            <div class="subtitle">Управление облачным парсингом</div>
            <a href="#" class="back-link" onclick="showScreen('search')">← Назад к поиску</a>
        </div>
        
        <div class="admin-header">
            <div class="form-group" style="margin-bottom:8px">
                <label>🔑 Админ-ключ</label>
                <input type="password" id="admin-key-input" placeholder="Введи ключ из Render">
            </div>
            <button class="btn btn-outline" id="btn-admin-login" style="margin:0; padding:10px"> Войти</button>
        </div>

        <div id="admin-controls" style="display:none">
            <div class="counter" id="admin-stats">Загрузка статистики...</div>
            
            <div class="form-group">
                <label>🔍 Запрос для Rusprofile</label>
                <input type="text" id="rp-query" value="Импорт" placeholder="Например: ВЭД, Китай">
            </div>
            
            <button class="btn" id="btn-parse">🚀 Запустить парсинг</button>
            <button class="btn btn-outline" id="btn-refresh-admin">🔄 Обновить список</button>
            <button class="btn btn-success" id="btn-export">📥 Скачать Excel</button>
            
            <div style="margin-top:20px">
                <label>Последние добавленные компании:</label>
                <div id="admin-leads-list"></div>
            </div>
        </div>
    </div>

    <!-- Панель действий -->
    <div class="toolbar" id="main-toolbar" style="display:none">
        <button class="btn btn-success" id="btn-download"> Скачать базу в Excel</button>
        <button class="btn btn-outline" id="btn-new"> Новый поиск</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const API_BASE = 'https://leadpotok-api.onrender.com';
        let currentLeads = [];
        let ADMIN_KEY = localStorage.getItem('admin_key') || '';

        // --- КНОПКА АДМИНКИ ---
        document.getElementById('fab-admin').addEventListener('click', () => {
            showScreen('admin');
            if (ADMIN_KEY) {
                document.getElementById('admin-key-input').value = ADMIN_KEY;
                loadAdminData();
            }
        });

        // Вход в админку
        document.getElementById('btn-admin-login').addEventListener('click', async () => {
            const key = document.getElementById('admin-key-input').value;
            if(!key) return tg.showAlert('Введи ключ!');
            
            try {
                const res = await fetch(`${API_BASE}/api/admin/stats`, { headers: { 'x-admin-key': key } });
                if(!res.ok) throw new Error('Неверный ключ');
                
                ADMIN_KEY = key;
                localStorage.setItem('admin_key', key);
                document.getElementById('admin-controls').style.display = 'block';
                document.querySelector('.admin-header').style.display = 'none';
                loadAdminData();
            } catch(e) {
                tg.showAlert(' Ошибка: ' + e.message);
            }
        });

        // Запуск парсинга
        document.getElementById('btn-parse').addEventListener('click', async () => {
            const query = document.getElementById('rp-query').value;
            const btn = document.getElementById('btn-parse');
            btn.disabled = true; btn.textContent = '⏳ Запуск...';
            
            try {
                const res = await fetch(`${API_BASE}/api/admin/parse/rusprofile?query=${encodeURIComponent(query)}`, {
                    method: 'POST', headers: { 'x-admin-key': ADMIN_KEY }
                });
                if(!res.ok) throw new Error('Ошибка');
                tg.showAlert('✅ Парсинг запущен! Жди 1-2 минуты');
                setTimeout(loadAdminData, 30000);
            } catch(e) {
                tg.showAlert('❌ Ошибка');
            } finally {
                btn.disabled = false; btn.textContent = '🚀 Запустить парсинг';
            }
        });

        // Экспорт Excel
        document.getElementById('btn-export').addEventListener('click', () => {
            window.open(`${API_BASE}/api/admin/export/excel?x-admin-key=${ADMIN_KEY}`, '_blank');
        });

        // Загрузка данных админки
        async function loadAdminData() {
            try {
                const statsRes = await fetch(`${API_BASE}/api/admin/stats`, { headers: { 'x-admin-key': ADMIN_KEY } });
                const stats = await statsRes.json();
                document.getElementById('admin-stats').innerHTML = `📊 Всего: <b>${stats.total}</b> | 🔥 Горячих: <b>${stats.hot}</b> |  Сегодня: <b>${stats.today}</b>`;
                
                const leadsRes = await fetch(`${API_BASE}/api/admin/leads?limit=10`, { headers: { 'x-admin-key': ADMIN_KEY } });
                const data = await leadsRes.json();
                document.getElementById('admin-leads-list').innerHTML = data.leads.map(l => `
                    <div class="lead-card">
                        <div class="lead-title">${l.company}</div>
                        <div class="lead-info">📞 ${l.phone || '—'} | 📍 ${l.city || '—'}</div>
                        <span class="lead-hot">${l.hot_level === 'hot' ? '🔥 Горячий' : '🌡️ Тёплый'}</span>
                    </div>
                `).join('');
            } catch(e) { console.error(e); }
        }

        // --- ОСНОВНАЯ ЛОГИКА ---
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            document.getElementById('main-toolbar').style.display = (id === 'leads') ? 'flex' : 'none';
            window.scrollTo(0,0);
        }

        document.getElementById('btn-reset').addEventListener('click', () => {
            document.getElementById('cargo_type').value = '';
            document.getElementById('regions').value = '';
        });

        document.getElementById('btn-find').addEventListener('click', async () => {
            const cargo = document.getElementById('cargo_type').value;
            const regions = document.getElementById('regions').value.trim();
            if (!cargo || !regions) { tg.showAlert('⚠️ Заполни форму'); return; }
            
            const btn = document.getElementById('btn-find');
            btn.disabled = true; btn.innerHTML = ' Загрузка...';
            
            try {
                const response = await fetch(`${API_BASE}/api/leads?cargo_type=${cargo}&city=${regions}`);
                const data = await response.json();
                currentLeads = data.leads || [];
                renderLeads(currentLeads, cargo, regions);
                showScreen('leads');
            } catch (err) {
                tg.showAlert('❌ Ошибка сети');
            } finally {
                btn.disabled = false; btn.innerHTML = '🔍 Найти клиентов';
            }
        });

        function renderLeads(leads, cargo, regions) {
            const container = document.getElementById('leads-list');
            document.getElementById('leads-count').textContent = leads.length;
            
            const cargoNames = {
                'одежда_текстиль': 'Одежда', 'электроника': 'Электроника',
                'оборудование': 'Оборудование', 'товары_для_дома': 'Товары для дома',
                'автозапчасти': 'Автозапчасти', 'сырьё': 'Сырьё', 'любые': 'Любые грузы'
            };
            
            document.getElementById('filters-summary').innerHTML = `<b>Фильтры:</b> ${cargoNames[cargo] || cargo} | 📍 ${regions}`;
            
            if (leads.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="icon">😕</div><p>Нет лидов</p></div>';
                return;
            }
            
            container.innerHTML = leads.map(lead => `
                <div class="lead-card">
                    <span class="lead-hot">🔥 ${lead.hot_level === 'hot' ? 'Очень горячий' : 'Тёплый'}</span>
                    <div class="lead-title">${lead.company}</div>
                    <div class="lead-info">📍 ${lead.city || 'Не указан'} | 📦 ${lead.cargo_type || 'Любые'}</div>
                    <a href="tel:${lead.phone?.replace(/\D/g,'')}" class="lead-phone">📞 ${lead.phone || 'Нет телефона'}</a>
                    <div class="lead-reason">${lead.reason || 'Найдено автоматически'}</div>
                </div>
            `).join('');
        }

        document.getElementById('btn-new').addEventListener('click', () => showScreen('search'));
        document.getElementById('current-time').textContent = new Date().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
    </script>
</body>
</html>
