<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЛидПоток: Китай</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #fff; color: #000; padding: 20px; text-align: center; }
        
        /*  ТЕСТОВАЯ КНОПКА - ОНА ДОЛЖНА БЫТЬ ВИДНА */
        .debug-btn {
            background-color: red;
            color: white;
            font-size: 24px;
            font-weight: bold;
            padding: 30px;
            border: 5px solid darkred;
            border-radius: 20px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .hidden { display: none; }
        .screen.active { display: block; }
        
        /* Стили админки */
        .admin-panel { background: #f0f0f0; padding: 20px; border-radius: 10px; margin-top: 20px; border: 2px dashed #333; }
        input { width: 90%; padding: 10px; margin: 10px 0; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; }
        .btn-action { background: #007bff; color: white; padding: 15px; border: none; border-radius: 10px; font-size: 18px; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <!-- 🔴 ЭТА КНОПКА ДОЛЖНА МИГАТЬ -->
    <button id="debug-test" class="debug-btn">🔴 ЕСЛИ ВИДИШЬ МЕНЯ - КОД ОБНОВИЛСЯ! 🔴</button>

    <h1>🇨🇳→🇷🇺 ЛидПоток</h1>
    <p>Тестируем кнопку...</p>

    <!-- ЭКРАН АДМИНКИ (Всегда виден для теста) -->
    <div class="admin-panel">
        <h3>⚙️ Админка</h3>
        <input type="password" id="admin-key" placeholder="Введи ADMIN_API_KEY">
        <button class="btn-action" onclick="checkAdmin()">🔓 Войти</button>
        <div id="admin-result" style="margin-top:15px; font-weight:bold;"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const API_BASE = 'https://leadpotok-api.onrender.com';

        // Обработка нажатия на тестовую кнопку
        document.getElementById('debug-test').addEventListener('click', () => {
            alert('✅ Кнопка работает! Код обновился!');
        });

        // Простая проверка админки
        window.checkAdmin = async function() {
            const key = document.getElementById('admin-key').value;
            const resDiv = document.getElementById('admin-result');
            
            if(!key) {
                resDiv.style.color = 'red';
                resDiv.textContent = ' Введи ключ!';
                return;
            }

            resDiv.textContent = ' Проверка...';
            
            try {
                const res = await fetch(`${API_BASE}/api/admin/stats`, {
                    headers: { 'x-admin-key': key }
                });
                
                if(res.ok) {
                    const data = await res.json();
                    resDiv.style.color = 'green';
                    resDiv.textContent = `✅ УСПЕХ! Всего лидов: ${data.total}`;
                } else {
                    resDiv.style.color = 'red';
                    resDiv.textContent = '❌ Неверный ключ (403)';
                }
            } catch(e) {
                resDiv.style.color = 'orange';
                resDiv.textContent = '⚠️ Ошибка сети';
            }
        };
    </script>
</body>
</html>
