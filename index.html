<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЛидПоток: Китай</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #fff);
            --text: var(--tg-theme-text-color, #000);
            --hint: var(--tg-theme-hint-color, #999);
            --button: var(--tg-theme-button-color, #3390ec);
            --button-text: var(--tg-theme-button-text-color, #fff);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #f1f1f1);
            --success: #4cd964;
            --danger: #ff3b30;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 16px; padding-bottom: 100px; line-height: 1.5; }
        
        /* Экраны */
        .screen { display: none; animation: fadeIn 0.3s; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Заголовки */
        .header { text-align: center; padding: 15px 0 20px; margin-bottom: 10px; border-bottom: 1px solid var(--secondary-bg); }
        .logo { font-size: 22px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .subtitle { color: var(--hint); font-size: 13px; margin-top: 4px; }
        
        /* Формы */
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 1px solid var(--secondary-bg); border-radius: 10px; background: var(--secondary-bg); color: var(--text); font-size: 16px; outline: none; }
        input:focus, select:focus { border-color: var(--button); }
        
        /* Кнопки */
        .btn { width: 100%; padding: 14px; background: var(--button); color: var(--button-text); border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.2s; }
        .btn:active { opacity: 0.8; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-outline { background: transparent; border: 2px solid var(--button); color: var(--button); }
        .btn-success { background: var(--success); color: #fff; }
        .btn-danger { background: var(--danger); color: #fff; }
        
        /* Плавающая кнопка админки */
        .fab-admin {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--button);
            color: var(--button-text);
            border: none;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(0,0,0,0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: transform 0.2s;
        }
        .fab-admin:hover { transform: scale(1.05); }
        
        /* Карточки лидов */
        .lead-card { background: var(--secondary-bg); border-radius: 12px; padding: 14px; margin-bottom: 12px; border-left: 4px solid var(--success); }
        .lead-title { font-weight: 700; font-size: 16px; margin-bottom: 4px; }
        .lead-hot { display: inline-block; background: rgba(76, 217, 100, 0.15); color: var(--success); padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; margin-bottom: 8px; }
        .lead-info { font-size: 13px; color: var(--hint); margin: 4px 0; }
        .lead-phone { color: var(--button); font-weight: 600; text-decoration: none; display: block; margin: 8px 0; font-size: 15px; }
        
        /* Админка */
        .admin-header { background: #fff0f0; padding: 12px; border-radius: 10px; margin-bottom: 16px; border: 1px solid #ffcccc; }
        .stats-box { display: flex; justify-content: space-between; margin-bottom: 20px; text-align: center; }
        .stat-item { background: var(--secondary-bg); padding: 10px; border-radius: 8px; flex: 1; margin: 0 5px; }
        .stat-num { font-size: 20px; font-weight: bold; display: block; }
        .stat-label { font-size: 11px; color: var(--hint); }
    </style>
</head>
<body>

    <!-- 🟢 КНОПКА АДМИНКИ -->
    <button id="fab-admin" class="fab-admin">⚙️</button>

    <!-- ЭКРАН 1: ПОИСК -->
    <div id="screen-search" class="screen active">
        <div class="header">
            <div class="logo">🇨→🇷🇺 ЛидПоток</div>
            <div class="subtitle">Находи импортёров для доставки</div>
        </div>
        
        <div class="form-group">
            <label>📦 Грузы</label>
            <select id="cargo_type">
                <option value="">Выберите тип...</option>
                <option value="одежда_текстиль">Одежда, текстиль</option>
                <option value="электроника">Электроника</option>
                <option value="оборудование">Станки, оборудование</option>
                <option value="автозапчасти">Автозапчасти</option>
                <option value="любые">Любые грузы</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>📍 Регион доставки</label>
            <input type="text" id="regions" placeholder="Например: Москва">
        </div>
        
        <button class="btn" id="btn-find">🔍 Найти клиентов</button>
    </div>

    <!-- ЭКРАН 2: РЕЗУЛЬТАТЫ -->
    <div id="screen-leads" class="screen">
        <div class="header">
            <div class="logo">🔥 Найденные лиды</div>
            <div class="subtitle" id="leads-count">Найдено: 0</div>
        </div>
        <div id="leads-list"></div>
        <button class="btn btn-outline" onclick="showScreen('search')">🔄 Новый поиск</button>
    </div>

    <!-- ЭКРАН 3: АДМИНКА -->
    <div id="screen-admin" class="screen">
        <div class="header">
            <div class="logo">️ Управление</div>
            <div class="subtitle">Облачный парсер</div>
        </div>

        <!-- Вход -->
        <div id="login-panel" class="admin-header">
            <label>🔑 Админ-ключ</label>
            <input type="password" id="admin-key-input" placeholder="Введите ключ из Render">
            <button class="btn" id="btn-login">🔓 Войти</button>
        </div>

        <!-- Панель управления (скрыта до входа) -->
        <div id="admin-controls" style="display:none">
            <div class="stats-box">
                <div class="stat-item"><span class="stat-num" id="stat-total">0</span><span class="stat-label">Всего</span></div>
                <div class="stat-item"><span class="stat-num" id="stat-hot">0</span><span class="stat-label">Горячие</span></div>
            </div>

            <label>🔍 Запрос для поиска (Rusprofile)</label>
            <input type="text" id="rp-query" value="Импорт" placeholder="Например: ВЭД">
            
            <button class="btn" id="btn-parse">🚀 Запустить парсинг</button>
            <button class="btn btn-outline" id="btn-refresh">🔄 Обновить данные</button>
            <button class="btn btn-success" id="btn-export">📥 Скачать Excel</button>
            
            <div style="margin-top:20px; border-top:1px solid var(--secondary-bg); padding-top:10px;">
                <label>Последние компании:</label>
                <div id="admin-leads-list" style="margin-top:10px;"></div>
            </div>
            
            <button class="btn btn-danger" onclick="logout()" style="margin-top:30px">🚪 Выйти</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // ССЫЛКА НА API (ВНИМАНИЕ: Проверь, совпадает ли с твоим Render URL)
        const API_BASE = 'https://leadpotok-api.onrender.com';
        
        let ADMIN_KEY = localStorage.getItem('admin_key') || '';

        // --- НАВИГАЦИЯ ---
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            window.scrollTo(0,0);
        }

        document.getElementById('fab-admin').addEventListener('click', () => showScreen('admin'));

        // --- ЛОГИКА ПОИСКА ---
        document.getElementById('btn-find').addEventListener('click', async () => {
            const cargo = document.getElementById('cargo_type').value;
            const region = document.getElementById('regions').value;
            const btn = document.getElementById('btn-find');
            
            btn.disabled = true; btn.textContent = '⏳ Ищем...';
            
            try {
                // Запрос к публичному API
                const res = await fetch(`${API_BASE}/api/leads?cargo_type=${cargo}&city=${region}`);
                const data = await res.json();
                
                renderLeads(data.leads);
                showScreen('leads');
            } catch(e) {
                tg.showAlert('❌ Ошибка сети');
            } finally {
                btn.disabled = false; btn.textContent = ' Найти клиентов';
            }
        });

        function renderLeads(leads) {
            const list = document.getElementById('leads-list');
            document.getElementById('leads-count').textContent = `Найдено: ${leads.length}`;
            
            if(!leads.length) {
                list.innerHTML = '<p style="text-align:center; padding:40px; color:var(--hint)"> Ничего не найдено</p>';
                return;
            }
            
            list.innerHTML = leads.map(l => `
                <div class="lead-card">
                    <span class="lead-hot">🔥 ${l.hot_level === 'hot' ? 'Горячий' : 'Тёплый'}</span>
                    <div class="lead-title">${l.company}</div>
                    <div class="lead-info">📦 ${l.cargo_type || 'Любые'} | 📍 ${l.city || 'РФ'}</div>
                    ${l.phone ? `<a href="tel:${l.phone}" class="lead-phone">📞 Позвонить</a>` : ''}
                </div>
            `).join('');
        }

        // --- ЛОГИКА АДМИНКИ ---
        
        // Проверка при загрузке
        if(ADMIN_KEY) {
            document.getElementById('login-panel').style.display = 'none';
            document.getElementById('admin-controls').style.display = 'block';
            loadAdminData();
        }

        document.getElementById('btn-login').addEventListener('click', async () => {
            const key = document.getElementById('admin-key-input').value;
            if(!key) return;
            
            // Проверка ключа
            try {
                const res = await fetch(`${API_BASE}/api/admin/stats`, { headers: {'x-admin-key': key} });
                if(res.ok) {
                    ADMIN_KEY = key;
                    localStorage.setItem('admin_key', key);
                    document.getElementById('login-panel').style.display = 'none';
                    document.getElementById('admin-controls').style.display = 'block';
                    loadAdminData();
                } else {
                    tg.showAlert('❌ Неверный ключ');
                }
            } catch(e) {
                tg.showAlert('❌ Ошибка соединения');
            }
        });

        async function loadAdminData() {
            try {
                const res = await fetch(`${API_BASE}/api/admin/stats`, { headers: {'x-admin-key': ADMIN_KEY} });
                if(!res.ok) throw new Error("Auth Error");
                const data = await res.json();
                
                document.getElementById('stat-total').textContent = data.total;
                document.getElementById('stat-hot').textContent = data.hot;
                
                // Загружаем список последних
                const leadsRes = await fetch(`${API_BASE}/api/admin/leads?limit=5`, { headers: {'x-admin-key': ADMIN_KEY} });
                const leadsData = await leadsRes.json();
                
                document.getElementById('admin-leads-list').innerHTML = leadsData.leads.map(l => 
                    `<div style="padding:8px; background:var(--secondary-bg); margin-bottom:5px; border-radius:6px; font-size:13px;">
                        🏢 ${l.company} <br> <span style="color:var(--hint)">📞 ${l.phone || 'нет'}</span>
                    </div>`
                ).join('');
                
            } catch(e) {
                console.error(e);
            }
        }

        // Запуск парсинга
        document.getElementById('btn-parse').addEventListener('click', async () => {
            const query = document.getElementById('rp-query').value;
            const btn = document.getElementById('btn-parse');
            
            btn.disabled = true; btn.textContent = '⏳ Работает... (около 1 мин)';
            
            try {
                await fetch(`${API_BASE}/api/admin/parse/rusprofile?query=${encodeURIComponent(query)}`, {
                    method: 'POST', headers: {'x-admin-key': ADMIN_KEY}
                });
                
                tg.showAlert('✅ Парсинг запущен! Подожди минуту и нажми "Обновить".');
                
                // Через 60 секунд обновим данные
                setTimeout(() => {
                    btn.disabled = false; btn.textContent = '🚀 Запустить парсинг';
                    loadAdminData();
                }, 60000);
                
            } catch(e) {
                btn.disabled = false; btn.textContent = '🚀 Запустить парсинг';
                tg.showAlert('❌ Ошибка запуска');
            }
        });

        document.getElementById('btn-refresh').addEventListener('click', loadAdminData);

        // Скачивание Excel (ИСПРАВЛЕННОЕ)
        document.getElementById('btn-export').addEventListener('click', async () => {
            tg.showAlert('⏳ Генерирую файл...');
            try {
                const url = `${API_BASE}/api/admin/export/excel?x-admin-key=${encodeURIComponent(ADMIN_KEY)}`;
                
                // Используем fetch + blob, чтобы перехватить ошибки
                const response = await fetch(url);
                
                if (!response.ok) {
                    // Если сервер вернул ошибку (например 403), мы прочитаем JSON и покажем его
                    const errorData = await response.json();
                    throw new Error(errorData.detail || 'Ошибка сервера');
                }
                
                // Если всё ок, скачиваем
                const blob = await response.blob();
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = "leads_base.xlsx";
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(downloadUrl);
                
            } catch(e) {
                tg.showAlert('❌ Ошибка скачивания: ' + e.message);
            }
        });

        function logout() {
            localStorage.removeItem('admin_key');
            ADMIN_KEY = '';
            location.reload();
        }
    </script>
</body>
</html>
