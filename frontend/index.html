<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Lead Agent</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #0d1117);
            --card: var(--tg-theme-secondary-bg-color, #161b22);
            --text: var(--tg-theme-text-color, #c9d1d9);
            --hint: var(--tg-theme-hint-color, #8b949e);
            --accent: #58a6ff;
            --vk: #0077ff;
            --tg: #24a1de;
            --hot: #ff7b72;
            --warm: #d29922;
            --cold: #8b949e;
            --border: #30363d;
            --success: #3fb950;
            --danger: #f85149;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 16px;
            line-height: 1.5;
            min-height: 100vh;
        }
        .container { max-width: 600px; margin: 0 auto; }
        
        /* Login Screen */
        .login-box {
            background: var(--card);
            padding: 24px 20px;
            border-radius: 16px;
            text-align: center;
            margin-top: 60px;
            border: 1px solid var(--border);
        }
        .login-box h2 { color: var(--accent); margin-bottom: 8px; font-size: 22px; }
        .login-box p { color: var(--hint); font-size: 14px; margin-bottom: 20px; }
        
        /* Inputs & Buttons */
        input {
            width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px;
            background: var(--bg); color: var(--text); font-size: 16px; margin-bottom: 16px; outline: none;
        }
        input:focus { border-color: var(--accent); }
        
        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 16px;
            font-weight: 600; cursor: pointer; margin-bottom: 12px; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-vk { background: var(--vk); color: #fff; }
        .btn-tg { background: var(--tg); color: #fff; }
        .btn-login { background: var(--accent); color: #fff; }
        
        /* App Screen */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border);
        }
        .logo { font-size: 20px; font-weight: bold; color: var(--accent); }
        .version { font-size: 12px; color: var(--hint); background: var(--card); padding: 4px 8px; border-radius: 6px; }
        
        .stats {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px;
        }
        .stat-card {
            background: var(--card); padding: 16px; border-radius: 14px; text-align: center;
            border: 1px solid var(--border);
        }
        .stat-num { font-size: 28px; font-weight: 800; color: var(--accent); line-height: 1; }
        .stat-label { font-size: 12px; color: var(--hint); margin-top: 6px; }
        .stat-hot .stat-num { color: var(--hot); }
        
        .scan-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px;
        }
        
        .section-title {
            font-size: 16px; font-weight: 600; margin-bottom: 12px; color: var(--text);
            display: flex; align-items: center; gap: 6px;
        }
        
        /* Leads */
        .lead {
            background: var(--card); padding: 14px; border-radius: 14px; margin-bottom: 12px;
            border-left: 4px solid var(--cold); transition: transform 0.2s;
        }
        .lead:hover { transform: translateX(2px); }
        .lead.hot { border-left-color: var(--hot); }
        .lead.warm { border-left-color: var(--warm); }
        
        .lead-header {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 12px; color: var(--hint); margin-bottom: 8px;
        }
        .badge {
            padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; text-transform: uppercase;
        }
        .badge.hot { background: rgba(255,123,114,0.15); color: var(--hot); }
        .badge.warm { background: rgba(210,153,34,0.15); color: var(--warm); }
        .badge.cold { background: rgba(139,148,158,0.15); color: var(--cold); }
        
        .lead-content { font-size: 14px; margin-bottom: 10px; word-break: break-word; color: var(--text); }
        .lead-footer {
            display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--hint);
        }
        .contact { display: flex; align-items: center; gap: 4px; color: var(--accent); font-weight: 500; }
        .link { color: var(--accent); text-decoration: none; padding: 4px 8px; background: rgba(88,166,255,0.1); border-radius: 6px; }
        .link:hover { background: rgba(88,166,255,0.2); }
        
        .empty-state, .loading {
            text-align: center; padding: 30px 20px; color: var(--hint); font-size: 14px;
        }
        .error-msg {
            background: rgba(248,81,73,0.1); border: 1px solid var(--danger); color: var(--danger);
            padding: 12px; border-radius: 10px; margin-bottom: 15px; text-align: center; font-size: 14px;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Экран входа -->
    <div id="login-screen">
        <div class="login-box">
            <h2> AI Lead Agent</h2>
            <p>Введите ADMIN_API_KEY из Render</p>
            <input type="password" id="key-input" placeholder="superadmin123" autocomplete="off">
            <button class="btn btn-login" onclick="handleLogin(this)">🔓 Войти</button>
        </div>
    </div>

    <!-- Основной экран -->
    <div id="app-screen" style="display:none;">
        <div class="header">
            <div class="logo">🤖 Lead Agent</div>
            <div class="version">v4.1</div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-num" id="stat-total">0</div>
                <div class="stat-label">Всего лидов</div>
            </div>
            <div class="stat-card stat-hot">
                <div class="stat-num" id="stat-hot">0</div>
                <div class="stat-label">🔥 Горячие</div>
            </div>
        </div>

        <div class="scan-grid">
            <button class="btn btn-vk" id="btn-vk" onclick="runScan('vk', this)">🕷️ VK Scan</button>
            <button class="btn btn-tg" id="btn-tg" onclick="runScan('telegram', this)">✈️ TG Scan</button>
        </div>

        <div class="section-title"> Лента заявок</div>
        <div id="leads-list">
            <div class="empty-state">Нажмите кнопку сканирования для поиска</div>
        </div>
    </div>
</div>

<script>
    // Безопасная инициализация Telegram WebApp
    const tg = window.Telegram?.WebApp || null;
    if (tg) {
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#0d1117');
        tg.setBackgroundColor('#0d1117');
    }

    const API = window.location.origin;
    let ADMIN_KEY = localStorage.getItem('admin_key') || '';
    const keyInput = document.getElementById('key-input');

    // Автозаполнение и вход при загрузке
    if (ADMIN_KEY) {
        keyInput.value = ADMIN_KEY;
        setTimeout(() => document.querySelector('.btn-login').click(), 300);
    }

    // Уведомления (Telegram или обычный alert)
    function notify(msg) {
        if (tg?.showAlert) tg.showAlert(msg);
        else alert(msg);
    }

    // Вход в систему
    async function handleLogin(btn) {
        const key = keyInput.value.trim();
        if (!key) return notify('❌ Введите ADMIN_API_KEY');

        btn.disabled = true;
        btn.innerHTML = '⏳ Проверка...';

        try {
            const res = await fetch(`${API}/api/stats`, { headers: { 'x-admin-key': key } });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.detail || `Ошибка ${res.status}`);
            }

            ADMIN_KEY = key;
            localStorage.setItem('admin_key', key);
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            
            const data = await res.json();
            updateStats(data);
            loadLeads();
        } catch (e) {
            console.error('Login error:', e);
            notify('❌ ' + e.message);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '🔓 Войти';
        }
    }

    // Обновление статистики
    function updateStats(data) {
        document.getElementById('stat-total').textContent = data.total || 0;
        document.getElementById('stat-hot').textContent = data.hot || 0;
    }

    // Загрузка лидов
    async function loadLeads() {
        const container = document.getElementById('leads-list');
        container.innerHTML = '<div class="loading">⏳ Загрузка...</div>';

        try {
            const res = await fetch(`${API}/api/leads`, { headers: { 'x-admin-key': ADMIN_KEY } });
            if (!res.ok) throw new Error(`Ошибка ${res.status}`);
            
            const data = await res.json();
            if (!data.leads?.length) {
                container.innerHTML = '<div class="empty-state">📭 Лидов пока нет.<br>Запустите сканирование.</div>';
                return;
            }

            container.innerHTML = data.leads.map(l => {
                const type = (l.type || 'cold').toLowerCase();
                const badgeClass = type === 'hot' ? 'hot' : type === 'warm' ? 'warm' : 'cold';
                const badgeText = type === 'hot' ? '🔥 HOT' : type === 'warm' ? '🟡 WARM' : '⚪ COLD';
                const time = new Date(l.created_at).toLocaleString('ru-RU', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
                
                return `
                <div class="lead ${type}">
                    <div class="lead-header">
                        <span>${l.source || 'Unknown'} • ${time}</span>
                        <span class="badge ${badgeClass}">${badgeText}</span>
                    </div>
                    <div class="lead-content">${escapeHtml(l.content)}</div>
                    <div class="lead-footer">
                        <span class="contact">👤 ${escapeHtml(l.contact || 'Нет контакта')}</span>
                        ${l.url ? `<a href="${l.url}" target="_blank" class="link">Открыть ↗</a>` : ''}
                    </div>
                </div>`;
            }).join('');
        } catch (e) {
            container.innerHTML = `<div class="error-msg">❌ Ошибка загрузки: ${e.message}<br><button class="btn btn-login" onclick="loadLeads()" style="margin-top:10px;width:auto;padding:8px 16px;font-size:14px">🔄 Повторить</button></div>`;
        }
    }

    // Запуск сканирования (VK или Telegram)
    async function runScan(type, btn) {
        const endpoint = type === 'telegram' ? '/api/scan/telegram' : '/api/scan/vk';
        const originalText = btn.innerHTML;
        
        btn.disabled = true;
        btn.innerHTML = '⏳ Сканирование...';

        try {
            const res = await fetch(`${API}${endpoint}`, {
                method: 'POST',
                headers: { 'x-admin-key': ADMIN_KEY }
            });

            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.detail || `Ошибка ${res.status}`);
            }

            const data = await res.json();
            notify(`✅ ${type === 'telegram' ? 'Telegram' : 'VK'} сканирование завершено!\n\nНайдено: ${data.found || 0}`);
            
            await loadLeads();
            
            // Обновить статистику
            const statsRes = await fetch(`${API}/api/stats`, { headers: { 'x-admin-key': ADMIN_KEY } });
            if (statsRes.ok) updateStats(await statsRes.json());

        } catch (e) {
            console.error(`Scan ${type} error:`, e);
            notify(`❌ Ошибка сканирования ${type === 'telegram' ? 'TG' : 'VK'}:\n${e.message}`);
        } finally {
            btn.disabled = false;
            btn.innerHTML = originalText;
        }
    }

    // Экранирование HTML
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Глобальный обработчик ошибок
    window.addEventListener('error', e => console.error('Global error:', e.error));
</script>
</body>
</html>
