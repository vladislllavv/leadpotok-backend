<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Logistics Agent</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #0d1117);
            --card: var(--tg-theme-secondary-bg-color, #161b22);
            --text: var(--tg-theme-text-color, #c9d1d9);
            --accent: #58a6ff;
            --hot: #ff7b72;
            --warm: #d29922;
            --cold: #8b949e;
        }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; padding: 15px; margin: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { font-size: 20px; font-weight: bold; }
        .stats-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .stat-card { flex: 1; background: var(--card); padding: 15px; border-radius: 12px; text-align: center; }
        .stat-num { font-size: 24px; font-weight: bold; color: var(--accent); }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-vk { background: #0077ff; color: white; }
        .btn-tg { background: #24a1de; color: white; }
        .btn:disabled { opacity: 0.5; }
        
        .lead { background: var(--card); padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--cold); }
        .lead.hot { border-color: var(--hot); }
        .lead.warm { border-color: var(--warm); }
        .lead-header { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; color: #8b949e; }
        .lead-content { font-size: 15px; line-height: 1.4; margin-bottom: 8px; }
        .lead-footer { display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        .badge { padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .badge.hot { background: rgba(255, 123, 114, 0.2); color: var(--hot); }
        .badge.warm { background: rgba(210, 153, 34, 0.2); color: var(--warm); }
    </style>
</head>
<body>

<div id="login-screen" style="text-align: center; margin-top: 50px;">
    <h2>🤖 AI Agent Login</h2>
    <input type="password" id="key-input" placeholder="Admin Key" style="padding: 10px; width: 80%; border-radius: 8px; border: 1px solid #333; background: #0d1117; color: white; margin-bottom: 10px;">
    <button class="btn btn-vk" onclick="login()">Войти</button>
</div>

<div id="app-screen" style="display: none;">
    <div class="header">
        <div class="logo">🤖 Lead Agent</div>
        <div style="font-size: 12px; opacity: 0.6;">v4.0</div>
    </div>

    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-num" id="total-leads">0</div>
            <div style="font-size: 12px; opacity: 0.7;">Всего лидов</div>
        </div>
        <div class="stat-card">
            <div class="stat-num" id="hot-leads" style="color: var(--hot);">0</div>
            <div style="font-size: 12px; opacity: 0.7;">🔥 Горячие</div>
        </div>
    </div>

    <button class="btn btn-vk" id="btn-vk" onclick="scanVK()">
         Сканировать VK
    </button>
    
    <!-- Кнопка для TG (заглушка, пока не настроишь сессию) -->
    <button class="btn btn-tg" id="btn-tg" onclick="alert('Настрой Telegram Session в коде!')">
        ✈️ Сканировать Telegram
    </button>

    <h3 style="margin: 20px 0 10px; font-size: 16px;">📋 Лента заявок</h3>
    <div id="leads-list">
        <div style="text-align: center; opacity: 0.5; padding: 20px;">Нажмите "Сканировать", чтобы найти лидов...</div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    const API = 'https://leadpotok-api.onrender.com';
    let KEY = '';

    async function login() {
        KEY = document.getElementById('key-input').value;
        if(!KEY) return;
        
        // Проверка ключа
        const res = await fetch(API + '/api/stats', { headers: { 'x-admin-key': KEY } });
        if(res.ok) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            loadData();
        } else {
            tg.showAlert('Неверный ключ');
        }
    }

    async function loadData() {
        const stats = await (await fetch(API + '/api/stats', { headers: { 'x-admin-key': KEY } })).json();
        document.getElementById('total-leads').textContent = stats.total;
        document.getElementById('hot-leads').textContent = stats.hot;

        const leadsData = await (await fetch(API + '/api/leads', { headers: { 'x-admin-key': KEY } })).json();
        const list = document.getElementById('leads-list');
        list.innerHTML = '';
        
        if(leadsData.leads.length === 0) {
            list.innerHTML = '<div style="text-align: center; opacity: 0.5; padding: 20px;">Лидов пока нет</div>';
            return;
        }

        leadsData.leads.forEach(l => {
            const div = document.createElement('div');
            div.className = `lead ${l.type}`;
            div.innerHTML = `
                <div class="lead-header">
                    <span>${l.source} • ${new Date(l.created_at).toLocaleTimeString()}</span>
                    <span class="badge ${l.type}">${l.type.toUpperCase()}</span>
                </div>
                <div class="lead-content">${l.content}</div>
                <div class="lead-footer">
                    <span>👤 ${l.contact || 'Нет контакта'}</span>
                    <a href="${l.url}" target="_blank" style="color: var(--accent); text-decoration: none;">Открыть ↗</a>
                </div>
            `;
            list.appendChild(div);
        });
    }

    async function scanVK() {
        const btn = document.getElementById('btn-vk');
        btn.disabled = true;
        btn.textContent = '⏳ Сканирование...';
        
        try {
            await fetch(API + '/api/scan/vk', { method: 'POST', headers: { 'x-admin-key': KEY } });
            tg.showAlert('✅ Сканирование завершено!');
            loadData();
        } catch(e) {
            tg.showAlert('❌ Ошибка сканирования');
        } finally {
            btn.disabled = false;
            btn.innerHTML = ' Сканировать VK';
        }
    }
</script>

</body>
</html>
