<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadPotok Admin</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: var(--tg-theme-bg-color, #fff); --text: var(--tg-theme-text-color, #000); --btn: var(--tg-theme-button-color, #3390ec); --btn-text: var(--tg-theme-button-text-color, #fff); --secondary: var(--tg-theme-secondary-bg-color, #f1f1f1); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 16px; }
        .card { background: var(--secondary); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .stats { display: flex; gap: 10px; margin-bottom: 20px; }
        .stat-box { flex: 1; text-align: center; background: var(--bg); padding: 12px; border-radius: 10px; }
        .stat-num { font-size: 24px; font-weight: bold; }
        .stat-label { font-size: 12px; color: var(--tg-theme-hint-color, #999); }
        input, button { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 16px; margin-top: 8px; }
        input { background: var(--secondary); color: var(--text); }
        button { background: var(--btn); color: var(--btn-text); font-weight: 600; cursor: pointer; }
        button:disabled { opacity: 0.6; }
        .lead { border-bottom: 1px solid rgba(0,0,0,0.1); padding: 10px 0; }
        .lead:last-child { border-bottom: none; }
        .lead-title { font-weight: 600; }
        .lead-info { font-size: 13px; color: var(--tg-theme-hint-color, #999); }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; }
        .hot { background: #ff3b30; color: #fff; }
        .warm { background: #ffcc00; color: #000; }
    </style>
</head>
<body>
    <h2 style="text-align:center; margin-bottom:20px;">⚙️ Управление</h2>
    
    <div class="stats">
        <div class="stat-box"><div class="stat-num" id="total">0</div><div class="stat-label">Всего</div></div>
        <div class="stat-box"><div class="stat-num" id="hot">0</div><div class="stat-label">Горячие</div></div>
    </div>

    <div id="login-section">
        <input type="password" id="admin-key" placeholder="Введи ADMIN_API_KEY">
        <button onclick="login()">🔓 Войти</button>
    </div>

    <div id="admin-panel" style="display:none;">
        <button onclick="parseVK()" id="btn-vk">🔵 Парсить VK группы</button>
        <button onclick="refreshData()" id="btn-refresh">🔄 Обновить данные</button>
        <button onclick="exportExcel()" id="btn-excel" style="background:#4cd964;">📥 Скачать Excel</button>
        
        <h3 style="margin:16px 0 8px;">Последние лиды:</h3>
        <div id="leads-list" class="card">Загрузка...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const API = 'https://leadpotok-api.onrender.com';
        let ADMIN_KEY = '';

        async function login() {
            ADMIN_KEY = document.getElementById('admin-key').value;
            if(!ADMIN_KEY) return tg.showAlert('Введи ключ!');
            
            try {
                const res = await fetch(`${API}/api/admin/stats`, { headers: { 'x-admin-key': ADMIN_KEY } });
                if(!res.ok) throw new Error('Неверный ключ');
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                refreshData();
            } catch(e) {
                tg.showAlert('❌ ' + e.message);
            }
        }

        async function refreshData() {
            try {
                const stats = await (await fetch(`${API}/api/admin/stats`, { headers: { 'x-admin-key': ADMIN_KEY } })).json();
                document.getElementById('total').textContent = stats.total;
                document.getElementById('hot').textContent = stats.hot;

                const leadsRes = await fetch(`${API}/api/admin/leads?limit=10`, { headers: { 'x-admin-key': ADMIN_KEY } });
                const { leads } = await leadsRes.json();
                
                const list = document.getElementById('leads-list');
                if(leads.length === 0) { list.innerHTML = '<p style="text-align:center;padding:20px;color:#999">Пока нет данных. Запусти парсинг!</p>'; return; }
                
                list.innerHTML = leads.map(l => `
                    <div class="lead">
                        <div class="lead-title">${l.company || 'Без названия'}</div>
                        <div class="lead-info">📞 ${l.phone || '—'} | 📍 ${l.city || '—'} <span class="badge ${l.lead_type}">${l.lead_type}</span></div>
                    </div>
                `).join('');
            } catch(e) { console.error(e); }
        }

        async function parseVK() {
            const btn = document.getElementById('btn-vk');
            btn.disabled = true; btn.textContent = '⏳ Ищем...';
            try {
                const res = await fetch(`${API}/api/admin/parse/vk`, { method: 'POST', headers: { 'x-admin-key': ADMIN_KEY } });
                const data = await res.json();
                tg.showAlert('✅ ' + data.message);
                setTimeout(() => { btn.disabled = false; btn.textContent = '🔵 Парсить VK группы'; refreshData(); }, 60000);
            } catch(e) {
                tg.showAlert('❌ Ошибка'); btn.disabled = false; btn.textContent = '🔵 Парсить VK группы';
            }
        }

        async function exportExcel() {
            tg.showAlert('⏳ Генерация файла...');
            try {
                const url = `${API}/api/admin/export/excel?x-admin-key=${encodeURIComponent(ADMIN_KEY)}`;
                const res = await fetch(url);
                if(!res.ok) throw new Error('Ошибка сервера');
                const blob = await res.blob();
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'leads.xlsx';
                a.click();
            } catch(e) { tg.showAlert('❌ ' + e.message); }
        }

        // Автозаполнение ключа из URL (для удобства тестов)
        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.get('key')) document.getElementById('admin-key').value = urlParams.get('key');
    </script>
</body>
</html>
