<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Lead Agent</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; padding: 20px; margin: 0; }
        .card { background: #161b22; padding: 20px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #30363d; }
        h1, h2 { color: #58a6ff; text-align: center; margin-top: 0; }
        input, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; }
        button { background: #0077ff; border: none; font-weight: bold; cursor: pointer; }
        button:disabled { opacity: 0.5; }
        .stats { display: flex; gap: 10px; margin-bottom: 15px; }
        .stat { flex: 1; background: #161b22; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #30363d; }
        .stat-num { font-size: 24px; font-weight: bold; color: #58a6ff; }
        .lead { background: #161b22; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid #8b949e; }
        .lead.hot { border-left-color: #ff7b72; }
        .lead.warm { border-left-color: #d29922; }
        .badge { padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; float: right; }
        .hot .badge { background: rgba(255,123,114,0.2); color: #ff7b72; }
        .warm .badge { background: rgba(210,153,34,0.2); color: #d29922; }
    </style>
</head>
<body>
    <div id="login" class="card">
        <h2>🤖 AI Agent Login</h2>
        <input type="password" id="key" placeholder="ADMIN_API_KEY">
        <button onclick="login()"> Войти</button>
    </div>
    <div id="app" style="display:none;">
        <div class="stats">
            <div class="stat"><div class="stat-num" id="total">0</div>Всего</div>
            <div class="stat"><div class="stat-num" id="hot">0</div>🔥 Горячие</div>
        </div>
        <button id="btn-scan" onclick="scan()">🕷️ Сканировать VK</button>
        <div id="leads"></div>
    </div>
    <script>
        const API = window.location.origin;
        let KEY = '';
        async function login() {
            KEY = document.getElementById('key').value;
            if(!KEY) return alert('Введите ключ!');
            const btn = event.target;
            btn.disabled = true; btn.textContent = '...';
            try {
                const r = await fetch(API + '/api/stats', {headers: {'x-admin-key': KEY}});
                if(!r.ok) throw new Error('Неверный ключ или сервер спит');
                const d = await r.json();
                document.getElementById('login').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                document.getElementById('total').textContent = d.total;
                document.getElementById('hot').textContent = d.hot;
                loadLeads();
            } catch(e) { alert('❌ ' + e.message); }
            finally { btn.disabled = false; btn.textContent = '🔓 Войти'; }
        }
        async function loadLeads() {
            const r = await fetch(API + '/api/leads', {headers: {'x-admin-key': KEY}});
            const d = await r.json();
            const div = document.getElementById('leads');
            if(!d.leads || !d.leads.length) { div.innerHTML = '<p style="text-align:center;color:#8b949e;padding:20px">Нет лидов. Запустите сканирование.</p>'; return; }
            div.innerHTML = d.leads.map(l => {
                const cls = l.type === 'hot' ? 'hot' : l.type === 'warm' ? 'warm' : '';
                const badge = l.type === 'hot' ? '🔥 HOT' : l.type === 'warm' ? ' WARM' : '⚪ COLD';
                return `<div class="lead ${cls}"><span class="badge">${badge}</span><b>${l.contact || 'Нет контакта'}</b><br>${l.content}</div>`;
            }).join('');
        }
        async function scan() {
            const btn = document.getElementById('btn-scan');
            btn.disabled = true; btn.textContent = ' Сканирование (30с)...';
            try {
                const r = await fetch(API + '/api/scan/vk', {method: 'POST', headers: {'x-admin-key': KEY}});
                if(!r.ok) throw new Error('Ошибка сканирования');
                alert('✅ Готово! Обновляю ленту...');
                loadLeads();
                const s = await fetch(API + '/api/stats', {headers: {'x-admin-key': KEY}});
                const sd = await s.json();
                document.getElementById('total').textContent = sd.total;
                document.getElementById('hot').textContent = sd.hot;
            } catch(e) { alert('❌ ' + e.message); }
            finally { btn.disabled = false; btn.textContent = '🕷️ Сканировать VK'; }
        }
    </script>
</body>
</html>
