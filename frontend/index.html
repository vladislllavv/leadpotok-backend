<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LeadPotok</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #000000);
            --hint: var(--tg-theme-hint-color, #999999);
            --button: var(--tg-theme-button-color, #3390ec);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #f1f1f1);
            --danger: #ff3b30;
            --success: #34c759;
            --warning: #ffcc00;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); padding: 16px; padding-bottom: 40px; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 22px; font-weight: 700; }
        .header p { font-size: 14px; color: var(--hint); margin-top: 4px; }
        .card { background: var(--secondary-bg); border-radius: 14px; padding: 16px; margin-bottom: 14px; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        .stat-box { background: var(--bg); border-radius: 12px; padding: 16px; text-align: center; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        .stat-num { font-size: 28px; font-weight: 800; color: var(--button); }
        .stat-label { font-size: 12px; color: var(--hint); margin-top: 4px; }
        input { width: 100%; padding: 14px 16px; border: 2px solid transparent; border-radius: 12px; background: var(--bg); color: var(--text); font-size: 16px; outline: none; margin-bottom: 12px; }
        input:focus { border-color: var(--button); }
        button { width: 100%; padding: 14px; border: none; border-radius: 12px; background: var(--button); color: var(--button-text); font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 10px; transition: opacity 0.2s; }
        button:active { opacity: 0.8; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        button.secondary { background: transparent; border: 2px solid var(--button); color: var(--button); }
        button.success { background: var(--success); }
        button.danger { background: var(--danger); }
        .lead-item { background: var(--bg); border-radius: 12px; padding: 14px; margin-bottom: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        .lead-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .lead-company { font-weight: 600; font-size: 15px; }
        .badge { padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .badge.hot { background: var(--danger); color: white; }
        .badge.warm { background: var(--warning); color: black; }
        .badge.cold { background: var(--hint); color: white; }
        .lead-info { font-size: 13px; color: var(--hint); }
        .loading { text-align: center; padding: 20px; color: var(--hint); }
        .empty { text-align: center; padding: 30px 20px; color: var(--hint); }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚙️ Управление</h1>
        <p>Облачный парсер лидов</p>
    </div>

    <!-- Экран входа -->
    <div id="login-screen" class="card">
        <input type="password" id="admin-key" placeholder="Введите ADMIN_API_KEY">
        <button onclick="login()">🔓 Войти</button>
    </div>

    <!-- Панель администратора -->
    <div id="admin-panel" style="display:none;">
        <div class="stats">
            <div class="stat-box"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Всего</div></div>
            <div class="stat-box"><div class="stat-num" id="stat-hot">0</div><div class="stat-label">🔥 Горячие</div></div>
        </div>

        <button onclick="parseVK()" id="btn-vk">🔵 Парсить VK группы</button>
        <button onclick="refreshData()" id="btn-refresh" class="secondary">🔄 Обновить данные</button>
        <button onclick="exportExcel()" id="btn-export" class="success">📥 Скачать Excel</button>

        <div style="margin-top:16px; margin-bottom:8px; font-weight:600;">📋 Последние лиды:</div>
        <div id="leads-list" class="card"><div class="loading">Загрузка...</div></div>

        <button onclick="logout()" class="danger" style="margin-top:16px;">🚪 Выйти</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const API = 'https://leadpotok-api.onrender.com';
        let ADMIN_KEY = localStorage.getItem('admin_key') || '';

        // Автозаполнение если ключ сохранён
        if (ADMIN_KEY) {
            document.getElementById('admin-key').value = ADMIN_KEY;
            setTimeout(login, 300);
        }

        async function login() {
            const input = document.getElementById('admin-key');
            ADMIN_KEY = input.value.trim();
            if (!ADMIN_KEY) return tg.showAlert('❌ Введите админ-ключ');

            const btn = event.target;
            btn.disabled = true; btn.textContent = '⏳ Подключение...';

            try {
                const url = `${API}/api/admin/stats?x_admin_key=${encodeURIComponent(ADMIN_KEY)}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error((await res.json()).detail || `Ошибка ${res.status}`);

                const data = await res.json();
                localStorage.setItem('admin_key', ADMIN_KEY);
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                
                updateStats(data);
                await loadLeads();
            } catch (e) {
                tg.showAlert('❌ ' + e.message);
            } finally {
                btn.disabled = false; btn.textContent = '🔓 Войти';
            }
        }

        function updateStats(data) {
            document.getElementById('stat-total').textContent = data.total || 0;
            document.getElementById('stat-hot').textContent = data.hot || 0;
        }

        async function loadLeads() {
            const container = document.getElementById('leads-list');
            container.innerHTML = '<div class="loading">Загрузка...</div>';

            try {
                const url = `${API}/api/admin/leads?limit=15&x_admin_key=${encodeURIComponent(ADMIN_KEY)}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error('Ошибка загрузки');
                const data = await res.json();

                if (!data.leads || data.leads.length === 0) {
                    container.innerHTML = '<div class="empty">📭 Нет лидов. Запустите парсинг!</div>';
                    return;
                }

                container.innerHTML = data.leads.map(l => {
                    const type = l.lead_type || 'cold';
                    const badgeClass = type === 'hot' ? 'hot' : type === 'warm' ? 'warm' : 'cold';
                    const badgeText = type === 'hot' ? '🔥 Горячий' : type === 'warm' ? ' Тёплый' : '⚪ Холодный';
                    return `
                        <div class="lead-item">
                            <div class="lead-header">
                                <span class="lead-company">${escapeHtml(l.company || 'Без названия')}</span>
                                <span class="badge ${badgeClass}">${badgeText}</span>
                            </div>
                            <div class="lead-info">📞 ${escapeHtml(l.phone || '—')} | 📍 ${escapeHtml(l.city || '—')}</div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                container.innerHTML = '<div class="empty">❌ Ошибка: ' + e.message + '</div>';
            }
        }

        async function refreshData() {
            const btn = document.getElementById('btn-refresh');
            btn.disabled = true; btn.textContent = '⏳ Обновление...';
            try {
                const url = `${API}/api/admin/stats?x_admin_key=${encodeURIComponent(ADMIN_KEY)}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error('Ошибка');
                updateStats(await res.json());
                await loadLeads();
                tg.showAlert('✅ Данные обновлены');
            } catch (e) {
                tg.showAlert('❌ ' + e.message);
            } finally {
                btn.disabled = false; btn.textContent = '🔄 Обновить данные';
            }
        }

        async function parseVK() {
            const btn = document.getElementById('btn-vk');
            btn.disabled = true; btn.textContent = ' Ищем в VK...';
            try {
                const url = `${API}/api/admin/parse/vk?x_admin_key=${encodeURIComponent(ADMIN_KEY)}`;
                const res = await fetch(url, { method: 'POST' });
                if (!res.ok) throw new Error('Ошибка запуска');
                const data = await res.json();
                tg.showAlert('✅ ' + (data.message || 'Парсинг запущен!'));
                setTimeout(() => { btn.disabled = false; btn.textContent = '🔵 Парсить VK группы'; refreshData(); }, 60000);
            } catch (e) {
                tg.showAlert('❌ ' + e.message);
                btn.disabled = false; btn.textContent = ' Парсить VK группы';
            }
        }

        async function exportExcel() {
            tg.showAlert('⏳ Генерация файла...');
            try {
                const url = `${API}/api/admin/export/excel?x_admin_key=${encodeURIComponent(ADMIN_KEY)}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error('Ошибка генерации');
                const blob = await res.blob();
                if (blob.size < 100) throw new Error('Пустой файл');
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `leadpotok_${new Date().toISOString().split('T')[0]}.xlsx`;
                a.click();
                URL.revokeObjectURL(a.href);
                tg.showAlert('✅ Файл скачан!');
            } catch (e) {
                tg.showAlert('❌ ' + e.message);
            }
        }

        function logout() {
            localStorage.removeItem('admin_key');
            ADMIN_KEY = '';
            document.getElementById('admin-key').value = '';
            document.getElementById('login-screen').style.display = 'block';
            document.getElementById('admin-panel').style.display = 'none';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
