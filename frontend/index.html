<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>LeadPotok</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <h1>LeadPotok Mini App</h1>
    <button onclick="testAPI()">Тест API</button>
    <div id="result"></div>

    <script>
        const API = 'https://leadpotok-api.onrender.com';
        const ADMIN_KEY = 'твой_ключ'; // Замени на свой
        
        async function testAPI() {
            try {
                const res = await fetch(`${API}/api/admin/stats?x-admin-key=${ADMIN_KEY}`);
                const data = await res.json();
                document.getElementById('result').innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch(e) {
                document.getElementById('result').innerHTML = `Ошибка: ${e.message}`;
            }
        }
    </script>
</body>
</html>
