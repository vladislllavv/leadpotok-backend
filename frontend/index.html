<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Lead Agent</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #0d1117);
            --card: var(--tg-theme-secondary-bg-color, #161b22);
            --text: var(--tg-theme-text-color, #c9d1d9);
            --accent: #58a6ff;
            --hot: #ff7b72;
            --warm: #d29922;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif;
            padding: 16px; line-height: 1.5;
        }
        
        /* Login Screen */
        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }
        .login-box {
            background: var(--card);
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid #30363d;
            max-width: 400px;
            width: 100%;
        }
        .login-box h2 { color: var(--accent); margin-bottom: 10px; }
        .login-box p { color: #8b949e; font-size: 14px; margin-bottom: 20px; }
        input {
            width: 100%; padding: 14px; border: 1px solid #30363d; border-radius: 12px;
            background: var(--bg); color: var(--text); font-size: 16px; margin-bottom: 16px;
            outline: none;
        }
        input:focus { border-color: var(--accent); }
        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 12px;
            background: var(--accent); color: #fff;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* App Screen */
        #app-screen { display: none; }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #30363d;
        }
        .logo { font-size: 20px; font-weight: bold; color: var(--accent); }
        .stats {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px;
        }
        .stat-card {
            background: var(--card); padding: 14px; border-radius: 12px; text-align: center;
            border: 1px solid #30363d;
        }
        .stat-num { font-size: 24px; font-weight: bold; color: var(--accent); }
        .stat-label { font-size: 11px; color: #8b949e; margin-top: 4px; }
        .user-info {
            background: var(--card); padding: 12px; border-radius: 10px; margin-bottom: 16px;
        }
        .btn-scan { background: #24a1de; }
        .lead {
            background: var(--card); padding: 14px; border-radius: 12px; margin-bottom: 12px;
            border-left: 4px solid #8b949e;
        }
        .lead.hot { border-left-color: var(--hot); }
        .lead-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .score { font-weight: bold; padding: 2px 8px; border-radius: 6px; font-size: 12px; }
        .score.hot { background: rgba(255,123,114,0.2); color: var(--hot); }
        .lead-content { font-size: 14px; margin-bottom: 8px; }
        .lead-footer { display: flex; justify-content: space-between; font-size: 12px; color: #8b949e; }
        .empty { text-align: center; padding: 30px; color: #8b949e; }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen">
        <div class="login-box">
            <h2>🔐 AI Lead Agent</h2>
            <p>Введите ADMIN_API_KEY из Render</p>
            <input type="password" id="api-key-input" placeholder="adminkalidov">
            <button class="btn" onclick="saveKey()">🔓 Войти</button>
        </div>
    </div>

    <!-- App Screen -->
    <div id="app-screen">
        <div class="header">
            <div class="logo">🤖 AI Lead Agent</div>
        </div>

        <div class="user-info">
            <div style="font-weight:600" id="user-name">User</div>
            <div style="font-size:12px;color:#8b949e" id="leads-limit">0/5 лидов</div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-num" id="total-leads">0</div>
                <div class="stat-label">Всего лидов</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="hot-leads" style="color:var(--hot)">0</div>
                <div class="stat-label">🔥 Горячие</div>
            </div>
        </div>

        <button class="btn btn-scan" id="btn-scan" onclick="scan()">🔍 Найти лиды</button>

        <div id="leads-list">
            <div class="empty">Нажмите "Найти лиды"</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const API = window.location.origin;
        let ADMIN_KEY = localStorage.getItem('admin_key') || '';
        let USER_ID = null;
        let IS_PREMIUM = false;
        let LEADS_RECEIVED = 0;

        // Если ключ уже есть — показываем приложение
        if (ADMIN_KEY) {
            showApp();
        }

        function saveKey() {
            const input = document.getElementById('api-key-input');
            const key = input.value.trim();
            
            if (!key) {
                tg.showAlert('❌ Введите ключ!');
                return;
            }

            ADMIN_KEY = key;
            localStorage.setItem('admin_key', key);
            showApp();
        }

        function showApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            authUser();
        }

        async function authUser() {
            const user = tg.initDataUnsafe.user;
            if (!user) return;

            try {
                const res = await fetch(`${API}/api/auth`, {
                    method: 'POST',
                    headers: {
                        'telegram_id': String(user.id),
                        'username': user.username || '',
                        'first_name': user.first_name || ''
                    }
                });

                const data = await res.json();
                USER_ID = data.user_id;
                IS_PREMIUM = data.is_premium;
                LEADS_RECEIVED = data.leads_received;

                document.getElementById('user-name').textContent = user.first_name || 'User';
                document.getElementById('leads-limit').textContent = 
                    `${LEADS_RECEIVED}/5 лидов ${IS_PREMIUM ? '(Premium)' : ''}`;
                
                if (!IS_PREMIUM && LEADS_RECEIVED >= 5) {
                    document.getElementById('btn-scan').disabled = true;
                    document.getElementById('leads-limit').textContent += ' (лимит превышен)';
                }

                loadLeads();
                updateStats();
            } catch (e) {
                console.error('Auth error:', e);
            }
        }

        async function scan() {
            if (!IS_PREMIUM && LEADS_RECEIVED >= 5) {
                tg.showAlert('❌ Превышен лимит 5 лидов/неделю');
                return;
            }

            const btn = document.getElementById('btn-scan');
            btn.disabled = true;
            btn.textContent = '⏳ Поиск...';

            try {
                const res = await fetch(`${API}/api/scan/telegram`, {
                    method: 'POST',
                    headers: { 'x-admin-key': ADMIN_KEY }
                });
                
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || `Ошибка ${res.status}`);
                }
                
                const data = await res.json();
                tg.showAlert(`✅ Найдено: ${data.found}\nГорячих: ${data.hot || 0}`);
                loadLeads();
                updateStats();
            } catch (e) {
                tg.showAlert('❌ Ошибка: ' + e.message);
                console.error('Scan error:', e);
            } finally {
                btn.disabled = false;
                btn.textContent = '🔍 Найти лиды';
            }
        }

        async function loadLeads() {
            try {
                const res = await fetch(`${API}/api/leads`, {
                    headers: { 
                        'x-admin-key': ADMIN_KEY,
                        'user_id': USER_ID || ''
                    }
                });
                
                if (!res.ok) throw new Error(`Ошибка ${res.status}`);
                
                const data = await res.json();
                const list = document.getElementById('leads-list');

                if (!data.leads.length) {
                    list.innerHTML = '<div class="empty">Нет лидов</div>';
                    return;
                }

                list.innerHTML = data.leads.map(l => `
                    <div class="lead ${l.is_hot ? 'hot' : l.type === 'warm' ? 'warm' : ''}">
                        <div class="lead-header">
                            <span>${l.source}</span>
                            <span class="score ${l.score >= 80 ? 'hot' : ''}">${l.score}/100</span>
                        </div>
                        <div class="lead-content">${l.content}</div>
                        <div class="lead-footer">
                            <span>👤 ${l.contact || 'Нет контакта'}</span>
                            ${l.is_hot ? '<span>🔥 HOT</span>' : ''}
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error('Load leads error:', e);
            }
        }

        async function updateStats() {
            try {
                const res = await fetch(`${API}/api/stats`, {
                    headers: { 'x-admin-key': ADMIN_KEY }
                });
                const data = await res.json();
                document.getElementById('total-leads').textContent = data.total;
                document.getElementById('hot-leads').textContent = data.hot;
            } catch (e) {
                console.error('Stats error:', e);
            }
        }
    </script>
</body>
</html>
